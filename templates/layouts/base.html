{{define "base.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.Title}} — specd</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
  <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="stylesheet" href="/css/app.css?v={{.CSSHash}}" />
  <script type="module" src="/vendor/beer.min.js"></script>
  <script type="module" src="/vendor/material-dynamic-colors.min.js"></script>
</head>
<body class="surface">
  {{template "nav" .}}

  <main class="{{if eq .Active "tasks"}}responsive max{{else}}responsive{{end}} mt-l" id="main-content">
    {{block "content" .}}{{end}}
  </main>

  {{template "footer" .}}

  <script src="/vendor/htmx.min.js"></script>
  <script src="/js/app.js?v={{.JSHash}}"></script>
  <script src="/js/tasks.js?v={{.JSHash}}"></script>
  {{if .DevMode}}<script src="/js/livereload.js"></script>{{end}}
</body>
</html>
{{end}}
