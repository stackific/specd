version: "3"

vars:
  BINARY: specd
  MODULE: github.com/stackific/specd
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  LDFLAGS: -X {{.MODULE}}/cmd.Version={{.VERSION}}

env:
  CGO_ENABLED: "0"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  build:
    desc: Build the binary (UI + Go)
    deps: [ui:build]
    cmds:
      - go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}} .
      - echo "Built bin/{{.BINARY}} ({{.VERSION}})"

  run:
    desc: Build and run
    cmds:
      - go run -ldflags '{{.LDFLAGS}}' .

  dev:
    desc: Live reload during development (Go only)
    cmds:
      - air

  qa:
    desc: Init tmp project, Vite dev + Go --spa-proxy live reload — open localhost:8000
    # Implementation lives in scripts/qa.sh because Task's embedded shell
    # (mvdan/sh) rejects bare signal names like INT/TERM in the trap
    # builtin, breaking the cleanup-on-exit handler this task depends on.
    cmds:
      - bash scripts/qa.sh

  ui:install:
    desc: Install frontend (TanStack Start/React/shadcn) deps
    dir: frontend
    cmds:
      - pnpm install
    sources:
      - package.json
      - pnpm-lock.yaml

  ui:dev:
    desc: Run Vite dev server only (no Go) on localhost:5173
    dir: frontend
    cmds:
      - pnpm dev

  ui:build:
    desc: Build frontend SPA into frontend/dist
    dir: frontend
    deps: [ui:install]
    cmds:
      - pnpm build
    sources:
      - src/**/*
      - package.json
      - vite.config.ts
      - tsconfig.json
    generates:
      - dist/index.html

  ui:typecheck:
    desc: Run tsc --noEmit on frontend
    dir: frontend
    cmds:
      - pnpm typecheck

  ui:lint:
    desc: Run eslint on frontend
    dir: frontend
    cmds:
      - pnpm lint

  test:
    desc: Run tests with pass/fail counts
    cmds:
      - |
        output=$(go test -v ./... 2>&1)
        passed=$(echo "$output" | grep -c "^--- PASS" || true)
        failed=$(echo "$output" | grep -c "^--- FAIL" || true)
        echo "Passed: $passed  Failed: $failed"
        if [ "$failed" -gt 0 ]; then echo "$output" | grep "^--- FAIL"; exit 1; fi

  test:verbose:
    desc: Run tests with full output
    cmds:
      - go test -v ./...

  # --- Formatting ---

  fmt:
    desc: Format all Go files (gofumpt + goimports + gci)
    cmds:
      - gofumpt -w .
      - goimports -w .
      - gci write --section standard --section default --section "prefix({{.MODULE}})" .

  fmt:check:
    desc: Check formatting without writing
    cmds:
      - test -z "$(gofumpt -d .)" || (echo "gofumpt needs fixing" && exit 1)
      - test -z "$(goimports -l .)" || (echo "goimports needs fixing" && exit 1)
      - gci diff --section standard --section default --section "prefix({{.MODULE}})" .

  # --- Linting ---

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: Run golangci-lint with auto-fix
    cmds:
      - golangci-lint run --fix ./...

  # --- Security ---

  sec:
    desc: Run all security checks
    cmds:
      - task: sec:gosec
      - task: sec:vulncheck
      - task: sec:gitleaks

  sec:gosec:
    desc: Run gosec via golangci-lint
    cmds:
      - golangci-lint run --enable-only gosec ./...

  sec:vulncheck:
    desc: Check dependencies for known vulnerabilities
    cmds:
      - govulncheck ./...

  sec:gitleaks:
    desc: Scan for leaked secrets
    cmds:
      - gitleaks detect --no-banner

  # --- Dead code ---

  deadcode:
    desc: Find unreachable code from main
    cmds:
      - deadcode ./...

  # --- Quality gate (runs everything) ---

  check:
    desc: Run all checks (fmt, lint, test, security, ui)
    cmds:
      - task: fmt:check
      - task: lint
      - task: ui:lint
      - task: ui:typecheck
      - task: test
      - task: sec

  # --- Git hooks ---

  hooks:install:
    desc: Install lefthook git hooks
    cmds:
      - lefthook install

  hooks:uninstall:
    desc: Uninstall lefthook git hooks
    cmds:
      - lefthook uninstall

  # --- Clean ---

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ tmp/ frontend/dist/*

  # --- Cross-compilation ---

  build:all:
    desc: Cross-compile for Windows, Linux, and macOS
    cmds:
      - task: build:linux-amd64
      - task: build:linux-arm64
      - task: build:darwin-amd64
      - task: build:darwin-arm64
      - task: build:windows-amd64
      - task: build:windows-arm64

  build:linux-amd64:
    cmds:
      - GOOS=linux GOARCH=amd64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-linux-amd64 .

  build:linux-arm64:
    cmds:
      - GOOS=linux GOARCH=arm64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-linux-arm64 .

  build:darwin-amd64:
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-darwin-amd64 .

  build:darwin-arm64:
    cmds:
      - GOOS=darwin GOARCH=arm64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-darwin-arm64 .

  build:windows-amd64:
    cmds:
      - GOOS=windows GOARCH=amd64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-windows-amd64.exe .

  build:windows-arm64:
    cmds:
      - GOOS=windows GOARCH=arm64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-windows-arm64.exe .
