version: "3"

vars:
  BINARY: specd
  MODULE: github.com/stackific/specd
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  LDFLAGS: -X {{.MODULE}}/cmd.Version={{.VERSION}}

env:
  CGO_ENABLED: "0"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  build:
    desc: Build the binary (CSS + Go)
    deps: [css:build]
    cmds:
      - go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}} .
      - echo "Built bin/{{.BINARY}} ({{.VERSION}})"

  run:
    desc: Build and run
    deps: [css:build]
    cmds:
      - go run -ldflags '{{.LDFLAGS}}' .

  dev:
    desc: Live reload during development (Go only)
    cmds:
      - air

  # --- CSS Build ---

  css:install:
    desc: Install CSS build dependencies
    dir: static
    cmds:
      - pnpm install
    sources:
      - package.json
      - pnpm-lock.yaml
    generates:
      - node_modules/.pnpm/lock.yaml

  css:lint:
    desc: Run Stylelint on CSS source
    dir: static
    cmds:
      - pnpm run lint

  css:lint:fix:
    desc: Run Stylelint with auto-fix
    dir: static
    cmds:
      - pnpm run lint:fix

  css:build:
    desc: Build CSS (bundle + purge + minify)
    dir: static
    deps: [css:install]
    cmds:
      - pnpm run build:css
    sources:
      - css/src/**/*.scss
      - ../templates/**/*.html
      - package.json
    generates:
      - css/dist/app.css

  qa:
    desc: Init tmp project, Go live reload with dev mode — open localhost:8000
    cmds:
      - |
        # Build Go once so specd init can run.
        task css:build
        CGO_ENABLED=0 go build -o tmp/specd .

        # Always re-create QA project so it picks up current constants/schema.
        rm -rf tmp/qa
        mkdir -p tmp/qa
        (cd tmp/qa && ../../tmp/specd init --dir specd --username qa --skip-skills)

        echo ""
        echo "  Open http://localhost:8000 (Go + live reload)"
        echo ""

        # Air watches Go + templates + CSS and restarts serve with --dev.
        air -c .air-qa.toml

  test:
    desc: Run tests with pass/fail counts
    cmds:
      - |
        output=$(go test -v ./... 2>&1)
        passed=$(echo "$output" | grep -c "^--- PASS" || true)
        failed=$(echo "$output" | grep -c "^--- FAIL" || true)
        echo "Passed: $passed  Failed: $failed"
        if [ "$failed" -gt 0 ]; then echo "$output" | grep "^--- FAIL"; exit 1; fi

  test:verbose:
    desc: Run tests with full output
    cmds:
      - go test -v ./...

  # --- Formatting ---

  fmt:
    desc: Format all Go files (gofumpt + goimports + gci)
    cmds:
      - gofumpt -w .
      - goimports -w .
      - gci write --section standard --section default --section "prefix({{.MODULE}})" .

  fmt:check:
    desc: Check formatting without writing
    cmds:
      - test -z "$(gofumpt -d .)" || (echo "gofumpt needs fixing" && exit 1)
      - test -z "$(goimports -l .)" || (echo "goimports needs fixing" && exit 1)
      - gci diff --section standard --section default --section "prefix({{.MODULE}})" .

  # --- Linting ---

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: Run golangci-lint with auto-fix
    cmds:
      - golangci-lint run --fix ./...

  # --- Security ---

  sec:
    desc: Run all security checks
    cmds:
      - task: sec:gosec
      - task: sec:vulncheck
      - task: sec:gitleaks

  sec:gosec:
    desc: Run gosec via golangci-lint
    cmds:
      - golangci-lint run --enable-only gosec ./...

  sec:vulncheck:
    desc: Check dependencies for known vulnerabilities
    cmds:
      - govulncheck ./...

  sec:gitleaks:
    desc: Scan for leaked secrets
    cmds:
      - gitleaks detect --no-banner

  # --- Dead code ---

  deadcode:
    desc: Find unreachable code from main
    cmds:
      - deadcode ./...

  # --- Quality gate (runs everything) ---

  check:
    desc: Run all checks (fmt, lint, test, security, CSS)
    cmds:
      - task: fmt:check
      - task: lint
      - task: css:lint
      - task: test
      - task: sec

  # --- Git hooks ---

  hooks:install:
    desc: Install lefthook git hooks
    cmds:
      - lefthook install

  hooks:uninstall:
    desc: Uninstall lefthook git hooks
    cmds:
      - lefthook uninstall

  # --- Clean ---

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ tmp/ static/css/dist/app.css

  # --- Cross-compilation ---

  build:all:
    desc: Cross-compile for Windows, Linux, and macOS
    cmds:
      - task: build:linux-amd64
      - task: build:linux-arm64
      - task: build:darwin-amd64
      - task: build:darwin-arm64
      - task: build:windows-amd64
      - task: build:windows-arm64

  build:linux-amd64:
    cmds:
      - GOOS=linux GOARCH=amd64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-linux-amd64 .

  build:linux-arm64:
    cmds:
      - GOOS=linux GOARCH=arm64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-linux-arm64 .

  build:darwin-amd64:
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-darwin-amd64 .

  build:darwin-arm64:
    cmds:
      - GOOS=darwin GOARCH=arm64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-darwin-arm64 .

  build:windows-amd64:
    cmds:
      - GOOS=windows GOARCH=amd64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-windows-amd64.exe .

  build:windows-arm64:
    cmds:
      - GOOS=windows GOARCH=arm64 go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-windows-arm64.exe .
