# Air config for QA mode (task qa).
# Watches Go files only — UI changes are picked up by Vite HMR via the
# --spa-proxy at http://127.0.0.1:5173. The binary runs from tmp/qa so the
# seeded QA project (specs, tasks, KB, .specd.cache) is its working dir.

root = "."
tmp_dir = "tmp"

[build]
  cmd = "CGO_ENABLED=0 go build -o tmp/specd ."
  full_bin = "cd tmp/qa && ../../tmp/specd serve --no-open --spa-proxy http://127.0.0.1:5173"
  include_ext = ["go", "sql"]
  exclude_dir = ["bin", "tmp", "frontend"]
  delay = 500

[misc]
  # Do NOT clean on exit: tmp/ contains tmp/qa (the seeded QA project)
  # alongside the built binary. clean_on_exit = true would delete tmp/
  # wholesale on every Air shutdown and erase the QA data.
  clean_on_exit = false
