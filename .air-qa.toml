root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/specd ./cmd/specd/"
  full_bin = "cd qa/run && ../../tmp/specd serve --port 7823"
  include_ext = ["go", "html", "css", "js"]
  include_dir = [".", "internal", "cmd", "templates", "assets", "styles/src"]
  exclude_dir = ["tmp", "dist", "vendor", "qa"]
  delay = 500

[misc]
  clean_on_exit = true
