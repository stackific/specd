version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofumpt
    - gci
  settings:
    gofumpt:
      extra-rules: true
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/stackific/specd)

linters:
  enable:
    # Static analysis
    - staticcheck
    - govet
    - errcheck
    - ineffassign
    - unused

    # Security
    - gosec

    # Style & naming
    - revive
    - misspell
    - copyloopvar

    # Complexity
    - gocyclo
    - gocognit

    # Bug prevention
    - bodyclose
    - gocritic

  settings:
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
        - name: unexported-return
        - name: unused-parameter
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-naming

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
