root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/specd ./cmd/specd/"
  full_bin = "cd tmp/devws && ../specd serve"
  include_ext = ["go", "html"]
  include_dir = [".", "internal", "cmd", "templates"]
  exclude_dir = ["tmp", "dist", "web", "vendor", "assets", "ref"]
  delay = 500

[misc]
  clean_on_exit = true
