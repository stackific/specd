# Air live reload config
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  cmd = "cd static && pnpm run build:css && cd .. && CGO_ENABLED=0 go build -o ./tmp/specd ."
  full_bin = "./tmp/specd serve --dev"
  delay = 1000
  exclude_dir = ["bin", "tmp", "static/node_modules", "static/css/dist"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "html", "css", "scss", "js"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
