# Air live reload config
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/specd"
  cmd = "CGO_ENABLED=0 go build -o ./tmp/specd ."
  delay = 1000
  exclude_dir = ["bin", "tmp", "node_modules", "frontend"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
